<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Create LPO — FleetCtrl</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    body{font-family:system-ui,-apple-system,sans-serif;background:#F1F5F9;margin:0;}
    .sidebar{width:240px;min-height:100vh;background:#0F172A;position:fixed;top:0;left:0;z-index:40;display:flex;flex-direction:column;}
    .nav-link{display:flex;align-items:center;gap:.75rem;padding:.6rem 1rem;border-radius:.6rem;color:#94A3B8;font-size:.875rem;font-weight:500;text-decoration:none;transition:background .15s,color .15s;}
    .nav-link:hover{background:#1E293B;color:#fff;}
    .nav-link.active{background:#1D4ED8;color:#fff;}
    .nav-section{font-size:.65rem;font-weight:700;letter-spacing:.1em;color:#475569;text-transform:uppercase;padding:1rem 1rem .25rem;}
    .dropdown-btn{display:flex;align-items:center;gap:.75rem;width:100%;padding:.6rem 1rem;border-radius:.6rem;color:#94A3B8;font-size:.875rem;font-weight:500;background:transparent;border:none;cursor:pointer;text-align:left;transition:background .15s,color .15s;}
    .dropdown-btn:hover{background:#1E293B;color:#fff;}
    .dropdown-btn.open{color:#fff;background:#1E293B;}
    .dropdown-items{display:none;padding-left:1.5rem;}
    .dropdown-items.open{display:block;}
    .sub-link{display:flex;align-items:center;gap:.5rem;padding:.45rem .75rem;border-radius:.5rem;color:#94A3B8;font-size:.8rem;text-decoration:none;transition:background .15s,color .15s;}
    .sub-link:hover{background:#1E293B;color:#fff;}
    .sub-link.active{color:#60A5FA;}
    .main{margin-left:240px;}
    .card{background:#fff;border-radius:1rem;box-shadow:0 1px 4px rgba(0,0,0,.07);border:1px solid #E2E8F0;}
    .pill{display:inline-flex;align-items:center;font-size:.7rem;font-weight:600;padding:.2rem .55rem;border-radius:999px;}
    .pill-success{background:#D1FAE5;color:#065F46;}
    .pill-warning{background:#FEF3C7;color:#92400E;}
    .pill-danger{background:#FEE2E2;color:#991B1B;}
    .pill-primary{background:#DBEAFE;color:#1D4ED8;}
    .pill-gray{background:#F1F5F9;color:#475569;}
    .btn{display:inline-flex;align-items:center;gap:.5rem;padding:.5rem 1rem;border-radius:.6rem;font-size:.85rem;font-weight:500;cursor:pointer;border:none;text-decoration:none;}
    .btn-primary{background:#3B82F6;color:#fff;}
    .btn-primary:hover{background:#2563EB;}
    .btn-outline{background:#fff;color:#0F172A;border:1px solid #E2E8F0;}
    .btn-outline:hover{background:#F8FAFC;}
    .btn-danger{background:#EF4444;color:#fff;}
    .btn-danger:hover{background:#DC2626;}
    .btn-success{background:#10B981;color:#fff;}
    table{width:100%;border-collapse:collapse;font-size:.85rem;}
    thead th{text-align:left;padding:.75rem 1rem;color:#64748B;font-weight:600;font-size:.75rem;text-transform:uppercase;letter-spacing:.05em;border-bottom:2px solid #E2E8F0;background:#F8FAFC;}
    tbody td{padding:.75rem 1rem;border-bottom:1px solid #F1F5F9;color:#334155;}
    tbody tr:hover{background:#F8FAFC;}
    .form-group{margin-bottom:1rem;}
    .form-group label{display:block;font-size:.8rem;font-weight:600;color:#334155;margin-bottom:.35rem;}
    .form-group input,.form-group select,.form-group textarea{width:100%;padding:.5rem .75rem;border:1px solid #E2E8F0;border-radius:.5rem;font-size:.85rem;outline:none;background:#fff;}
    .form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:#3B82F6;box-shadow:0 0 0 3px rgba(59,130,246,.1);}
    .toast{position:fixed;bottom:2rem;right:2rem;background:#0F172A;color:#fff;padding:1rem 1.5rem;border-radius:.75rem;font-size:.85rem;display:none;z-index:200;animation:slideUp .3s ease;}
    @keyframes slideUp{from{opacity:0;transform:translateY(1rem);}to{opacity:1;transform:translateY(0);}}
    @media(max-width:768px){.sidebar{display:none;}.main{margin-left:0;}}
</style>
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>
<div class="main">
  <header style="height:4rem;background:#fff;border-bottom:1px solid #E2E8F0;display:flex;align-items:center;gap:1rem;padding:0 1.5rem;position:sticky;top:0;z-index:30;">
    <div style="flex:1;max-width:28rem;position:relative;"><i class="fa-solid fa-magnifying-glass" style="position:absolute;left:.75rem;top:50%;transform:translateY(-50%);color:#94A3B8;font-size:.8rem;"></i><input type="text" placeholder="Search..." style="width:100%;padding:.5rem .75rem .5rem 2.25rem;font-size:.85rem;background:#F1F5F9;border:0;border-radius:.6rem;outline:none;" /></div>
    <div style="margin-left:auto;display:flex;align-items:center;gap:.75rem;">
      <button style="position:relative;padding:.5rem;border:0;background:transparent;cursor:pointer;"><i class="fa-solid fa-bell" style="color:#64748B;font-size:1rem;"></i><span style="position:absolute;top:.3rem;right:.3rem;width:.5rem;height:.5rem;background:#EF4444;border-radius:999px;"></span></button>
      <div style="width:2rem;height:2rem;background:#2563EB;border-radius:999px;display:flex;align-items:center;justify-content:center;"><span style="color:#fff;font-size:.7rem;font-weight:700;">AD</span></div>
    </div>
  </header>
  <main style="padding:1.5rem;">
    <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;">
      <a href="lpo-archive.html" class="btn btn-outline"><i class="fa-solid fa-arrow-left"></i>Back</a>
      <div><h1 style="font-size:1.5rem;font-weight:700;color:#0F172A;"><i class="fa-solid fa-file-contract" style="margin-right:.5rem;color:#3B82F6;"></i>Create LPO</h1></div>
    </div>
    <div class="card" style="padding:2rem;max-width:800px;">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
        <div class="form-group"><label>Supplier</label><select><option>-- Select Supplier --</option><option>AutoParts SA</option><option>LubeMax Ltd</option><option>FilterPro Inc</option><option>HydraFlex</option><option>TyreMaster</option><option>DriveLink Co</option><option>BrightFleet</option><option>PowerGen SA</option></select></div><div class="form-group"><label>Delivery Date</label><input type="date" placeholder="" /></div><div class="form-group"><label>Warehouse</label><select><option>-- Select Warehouse --</option><option>Main Warehouse</option><option>Satellite Depot A</option><option>Satellite Depot B</option></select></div><div class="form-group"><label>Priority</label><select><option>Normal</option><option>Urgent</option><option>Critical</option></select></div><div class="form-group"><label>Notes</label><textarea rows="3" placeholder="Additional notes..."></textarea></div>
      </div>
      <h3 style="font-size:1rem;font-weight:700;color:#0F172A;margin:1.5rem 0 1rem;border-top:1px solid #E2E8F0;padding-top:1rem;">Line Items</h3>
      <table>
        <thead><tr><th>Item</th><th>Qty</th><th>Unit Price</th><th>Total</th><th></th></tr></thead>
        <tbody id="items">
          <tr><td><input type="text" placeholder="Item name" style="width:100%;padding:.4rem;border:1px solid #E2E8F0;border-radius:.4rem;font-size:.8rem;"/></td><td><input type="number" value="1" style="width:5rem;padding:.4rem;border:1px solid #E2E8F0;border-radius:.4rem;font-size:.8rem;"/></td><td><input type="number" value="0" style="width:7rem;padding:.4rem;border:1px solid #E2E8F0;border-radius:.4rem;font-size:.8rem;"/></td><td style="font-weight:600;">$0.00</td><td><button onclick="this.closest('tr').remove()" class="btn btn-danger" style="padding:.3rem .5rem;font-size:.7rem;"><i class="fa-solid fa-trash"></i></button></td></tr>
        </tbody>
      </table>
      <button onclick="addItem()" class="btn btn-outline" style="margin-top:.75rem;"><i class="fa-solid fa-plus"></i>Add Item</button>
      <div style="display:flex;gap:.75rem;margin-top:1.5rem;padding-top:1rem;border-top:1px solid #E2E8F0;">
        <button onclick="showToast('Saved as draft')" class="btn btn-outline"><i class="fa-solid fa-floppy-disk"></i>Save Draft</button>
        <button onclick="showToast('LPO created successfully!')" class="btn btn-primary"><i class="fa-solid fa-check"></i>Submit</button>
      </div>
    </div>
    <script>
    function addItem(){
      const row=document.querySelector('#items tr').cloneNode(true);
      row.querySelectorAll('input').forEach(i=>i.value=i.type==='number'?(i.placeholder?0:1):'');
      document.getElementById('items').appendChild(row);
    }
    </script>
  </main>
</div>
<div id="toast" class="toast"></div>
<script>
function toggleDD(id){
  const el=document.getElementById(id);
  el.classList.toggle('open');
  el.previousElementSibling.classList.toggle('open');
}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.display='block';
  setTimeout(()=>t.style.display='none',3000);
}
// Auto-open active dropdown
(function(){
  const page=location.pathname.split('/').pop();
  document.querySelectorAll('.sub-link').forEach(a=>{
    if(a.getAttribute('href')===page){
      a.classList.add('active');
      const dd=a.closest('.dropdown-items');
      if(dd){dd.classList.add('open');dd.previousElementSibling.classList.add('open');}
    }
  });
  document.querySelectorAll('.nav-link').forEach(a=>{
    if(a.getAttribute('href')===page)a.classList.add('active');
  });
})();
</script>
<script src="store-sidebar.js"></script><script>renderStoreSidebar("lpo");</script>
</body>
</html>
