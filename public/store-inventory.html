<!doctype html>
<html lang="en">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Inventory — FleetCtrl Store</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>body{font-family:system-ui,-apple-system,sans-serif;background:#F1F5F9;}.sidebar{width:240px;min-height:100vh;background:#0F172A;position:fixed;top:0;left:0;z-index:40;display:flex;flex-direction:column;}.nav-link{display:flex;align-items:center;gap:.75rem;padding:.6rem 1rem;border-radius:.6rem;color:#94A3B8;font-size:.875rem;font-weight:500;text-decoration:none;transition:background .15s,color .15s;}.nav-link:hover{background:#1E293B;color:#fff;}.nav-link.active{background:#1D4ED8;color:#fff;}.nav-section{font-size:.65rem;font-weight:700;letter-spacing:.1em;color:#475569;text-transform:uppercase;padding:1rem 1rem .25rem;}.dropdown-btn{display:flex;align-items:center;gap:.75rem;width:100%;padding:.6rem 1rem;border-radius:.6rem;color:#94A3B8;font-size:.875rem;font-weight:500;background:transparent;border:none;cursor:pointer;text-align:left;transition:background .15s,color .15s;}.dropdown-btn:hover,.dropdown-btn.open{background:#1E293B;color:#fff;}.dropdown-items{display:none;padding-left:1.5rem;}.dropdown-items.open{display:block;}.sub-link{display:flex;align-items:center;gap:.5rem;padding:.45rem .75rem;border-radius:.5rem;color:#94A3B8;font-size:.8rem;text-decoration:none;transition:background .15s,color .15s;}.sub-link:hover{background:#1E293B;color:#fff;}.sub-link.active{color:#60A5FA;}.main{margin-left:240px;}.card{background:#fff;border-radius:1rem;box-shadow:0 1px 4px rgba(0,0,0,.07);border:1px solid #E2E8F0;}.pill{display:inline-flex;align-items:center;font-size:.7rem;font-weight:600;padding:.2rem .55rem;border-radius:999px;}.pill-success{background:#D1FAE5;color:#065F46;}.pill-warning{background:#FEF3C7;color:#92400E;}.pill-danger{background:#FEE2E2;color:#991B1B;}.pill-primary{background:#DBEAFE;color:#1D4ED8;}.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center;}.modal.open{display:flex;}.modal-box{background:#fff;border-radius:1rem;padding:2rem;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;}label{font-size:.8rem;font-weight:600;color:#374151;display:block;margin-bottom:.35rem;}input,select,textarea{width:100%;padding:.6rem .75rem;border:1px solid #E2E8F0;border-radius:.5rem;font-size:.85rem;outline:none;transition:border .15s;}input:focus,select:focus,textarea:focus{border-color:#3B82F6;}@media(max-width:768px){.sidebar{display:none;}.main{margin-left:0;}}</style>
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>
<div class="main">
<header style="height:4rem;background:#fff;border-bottom:1px solid #E2E8F0;display:flex;align-items:center;gap:1rem;padding:0 1.5rem;position:sticky;top:0;z-index:30;">
  <div style="flex:1;max-width:28rem;position:relative;"><i class="fa-solid fa-magnifying-glass" style="position:absolute;left:.75rem;top:50%;transform:translateY(-50%);color:#94A3B8;font-size:.8rem;"></i><input oninput="srch(this.value)" placeholder="Search inventory..." style="width:100%;padding:.5rem .75rem .5rem 2.25rem;font-size:.85rem;background:#F1F5F9;border:0;border-radius:.6rem;outline:none;"/></div>
  <button onclick="openAdd()" style="display:flex;align-items:center;gap:.5rem;padding:.5rem 1rem;background:#3B82F6;color:#fff;border:none;border-radius:.6rem;font-size:.85rem;font-weight:500;cursor:pointer;"><i class="fa-solid fa-plus"></i>Add New</button>
</header>
<main style="padding:1.5rem;">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:1rem;">
    <div><h1 style="font-size:1.5rem;font-weight:700;color:#0F172A;">Inventory</h1><p id="lbl" style="color:#64748B;font-size:.875rem;margin-top:.25rem;">10 records</p></div>
    <button onclick="openAdd()" style="display:flex;align-items:center;gap:.5rem;padding:.5rem 1rem;background:#3B82F6;color:#fff;border:none;border-radius:.6rem;font-size:.85rem;font-weight:500;cursor:pointer;"><i class="fa-solid fa-plus"></i>Add Inventory</button>
  </div>
  <div class="card" style="overflow:auto;">
    <table style="width:100%;border-collapse:collapse;min-width:700px;">
      <thead style="background:#F8FAFC;"><tr><th style="padding:.75rem 1rem;text-align:left;font-size:.75rem;font-weight:600;color:#64748B;border-bottom:1px solid #E2E8F0;">Part #</th><th style="padding:.75rem 1rem;text-align:left;font-size:.75rem;font-weight:600;color:#64748B;border-bottom:1px solid #E2E8F0;">Name</th><th style="padding:.75rem 1rem;text-align:left;font-size:.75rem;font-weight:600;color:#64748B;border-bottom:1px solid #E2E8F0;">Category</th><th style="padding:.75rem 1rem;text-align:left;font-size:.75rem;font-weight:600;color:#64748B;border-bottom:1px solid #E2E8F0;">Brand</th><th style="padding:.75rem 1rem;text-align:left;font-size:.75rem;font-weight:600;color:#64748B;border-bottom:1px solid #E2E8F0;">Stock</th><th style="padding:.75rem 1rem;text-align:left;font-size:.75rem;font-weight:600;color:#64748B;border-bottom:1px solid #E2E8F0;">Unit</th><th style="padding:.75rem 1rem;text-align:left;font-size:.75rem;font-weight:600;color:#64748B;border-bottom:1px solid #E2E8F0;">Price</th><th style="padding:.75rem 1rem;text-align:left;font-size:.75rem;font-weight:600;color:#64748B;border-bottom:1px solid #E2E8F0;">Status</th><th style="padding:.75rem 1rem;text-align:center;font-size:.75rem;font-weight:600;color:#64748B;border-bottom:1px solid #E2E8F0;">Actions</th></tr></thead>
      <tbody id="tb"></tbody>
    </table>
  </div>
</main>
</div>
<!-- Modal -->
<div class="modal" id="modal">
<div class="modal-box">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;"><h2 id="mTitle" style="font-size:1.1rem;font-weight:700;color:#0F172A;">Add Record</h2><button onclick="closeModal()" style="background:none;border:none;cursor:pointer;color:#64748B;font-size:1.2rem;"><i class="fa-solid fa-xmark"></i></button></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;" id="mFields"></div>
  <div style="display:flex;justify-content:flex-end;gap:.75rem;margin-top:1.5rem;">
    <button onclick="closeModal()" style="padding:.5rem 1.25rem;border:1px solid #E2E8F0;border-radius:.5rem;background:#fff;font-size:.85rem;cursor:pointer;">Cancel</button>
    <button onclick="saveRecord()" style="padding:.5rem 1.25rem;border:none;border-radius:.5rem;background:#3B82F6;color:#fff;font-size:.85rem;font-weight:600;cursor:pointer;">Save</button>
  </div>
</div>
</div>
<script>
const COLS=['Part #', 'Name', 'Category', 'Brand', 'Stock', 'Unit', 'Price', 'Status'];
let data=[
  ["PRT-001","Engine Oil Filter","Filters","Bosch","24","pcs","$12.50","In Stock"],
  ["PRT-002","Michelin 11R22.5 Tyre","Tyres","Michelin","18","pcs","$420.00","In Stock"],
  ["PRT-003","Brake Pad Set (Heavy)","Brakes","Brembo","8","set","$85.00","Low Stock"],
  ["PRT-004","Air Filter - Truck","Filters","Mann","32","pcs","$18.00","In Stock"],
  ["PRT-005","Hydraulic Fluid 5L","Lubricants","Castrol","45","btl","$22.00","In Stock"],
  ["PRT-006","Fan Belt Set","Belts","Gates","12","set","$34.00","Low Stock"],
  ["PRT-007","Starter Motor 24V","Electrical","Bosch","4","pcs","$145.00","In Stock"],
  ["PRT-008","Clutch Plate Heavy","Clutch","LUK","6","pcs","$210.00","In Stock"],
  ["PRT-009","Battery 180Ah","Electrical","Willard","10","pcs","$185.00","In Stock"],
  ["PRT-010","Fuel Injector Nozzle","Fuel System","Delphi","5","pcs","$95.00","Out of Stock"],
];
let editIdx=-1;
function statusPill(v){
  if(v==="Active"||v==="In Stock")return'<span class="pill pill-success">&#9679; '+v+'</span>';
  if(v==="Low Stock"||v==="Inactive")return'<span class="pill pill-warning">&#9679; '+v+'</span>';
  if(v==="Out of Stock")return'<span class="pill pill-danger">&#9679; '+v+'</span>';
  return'<span style="font-size:.85rem;color:#0F172A;">'+v+'</span>';
}
function render(list){
  document.getElementById('tb').innerHTML=list.map(r=>{
    const ri=data.findIndex(d=>d.join()==r.join());
    const cells=r.map((v,i)=>i===r.length-1?`<td style="padding:.65rem 1rem;text-align:center;">${statusPill(v)}</td>`:`<td style="padding:.65rem 1rem;font-size:.82rem;color:${i===0?'#2563EB':'#374151'};font-weight:${i===0?700:400};">${v}</td>`).join('');
    return`<tr style="border-bottom:1px solid #F1F5F9;" onmouseover="this.style.background='#F8FAFC'" onmouseout="this.style.background=''">${cells}<td style="padding:.65rem 1rem;text-align:center;"><button onclick="openEdit(${ri})" style="padding:.3rem .6rem;border:1px solid #E2E8F0;border-radius:.4rem;background:#fff;cursor:pointer;font-size:.75rem;margin-right:.25rem;"><i class="fa-solid fa-pen" style="color:#3B82F6;"></i></button><button onclick="del(${ri})" style="padding:.3rem .6rem;border:1px solid #FEE2E2;border-radius:.4rem;background:#fff;cursor:pointer;font-size:.75rem;"><i class="fa-solid fa-trash" style="color:#EF4444;"></i></button></td></tr>`;
  }).join('');
}
function buildFields(vals){
  document.getElementById('mFields').innerHTML=COLS.map((c,i)=>`<div><label>${c}</label><input id="f${i}" value="${vals?vals[i]||'':''}" /></div>`).join('');
}
function openAdd(){editIdx=-1;document.getElementById('mTitle').textContent='Add Record';buildFields(null);document.getElementById('modal').classList.add('open');}
function openEdit(i){editIdx=i;document.getElementById('mTitle').textContent='Edit Record';buildFields(data[i]);document.getElementById('modal').classList.add('open');}
function saveRecord(){const vals=COLS.map((_,i)=>document.getElementById('f'+i).value);if(editIdx>=0)data[editIdx]=vals;else data.push(vals);closeModal();render(data);}
function del(i){if(confirm('Delete this record?')){data.splice(i,1);render(data);}}
function srch(q){const f=data.filter(r=>r.some(v=>v.toLowerCase().includes(q.toLowerCase())));document.getElementById('lbl').textContent=f.length+' found';render(f);}
function closeModal(){document.getElementById('modal').classList.remove('open');}
function toggleDD(id){const el=document.getElementById(id);el.classList.toggle('open');el.previousElementSibling.classList.toggle('open');}
render(data);
</script>
<script>
function toggleDD(id){var el=document.getElementById(id);if(!el)return;var open=el.classList.contains('open');document.querySelectorAll('.dropdown-items').forEach(function(d){d.classList.remove('open');});document.querySelectorAll('.dropdown-btn').forEach(function(b){b.classList.remove('open');});if(!open){el.classList.add('open');el.previousElementSibling.classList.add('open');}}
(function(){var p=location.pathname.split('/').pop()||'dashboard.html';document.querySelectorAll('.nav-link').forEach(function(a){if(a.getAttribute('href')===p){a.classList.add('active');}else{a.classList.remove('active');}});document.querySelectorAll('.sub-link').forEach(function(a){if(a.getAttribute('href')===p){a.classList.add('active');var dd=a.closest('.dropdown-items');if(dd){dd.classList.add('open');dd.previousElementSibling.classList.add('open');}}});})();
</script>
<script src="store-sidebar.js"></script><script>renderStoreSidebar("inv");</script>
</body></html>
