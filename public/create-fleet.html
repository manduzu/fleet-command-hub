<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Fleet — FleetCtrl</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    body { font-family: system-ui,-apple-system,sans-serif; background:#F1F5F9; }
    .card { background:#fff; border-radius:1rem; box-shadow:0 1px 4px rgba(0,0,0,.07); border:1px solid #E2E8F0; }
    .sidebar { width:240px; min-height:100vh; background:#0F172A; position:fixed; top:0; left:0; z-index:40; display:flex; flex-direction:column; overflow-y:auto; }
    .nav-link { display:flex; align-items:center; gap:.75rem; padding:.6rem 1rem; border-radius:.6rem; color:#94A3B8; font-size:.875rem; font-weight:500; text-decoration:none; transition:background .15s,color .15s; }
    .nav-link:hover { background:#1E293B; color:#fff; }
    .nav-link.active { background:#1D4ED8; color:#fff; }
    .nav-section { font-size:.65rem; font-weight:700; letter-spacing:.1em; color:#475569; text-transform:uppercase; padding:1rem 1rem .25rem; }
    .dropdown-content { display:none; padding-left:1rem; }
    .dropdown-content.open { display:block; }
    .dropdown-toggle { cursor:pointer; }
    .input-field { width:100%; padding:.6rem .9rem; border:1px solid #E2E8F0; border-radius:.6rem; font-size:.875rem; outline:none; transition:border .15s,box-shadow .15s; color:#0F172A; background:#fff; }
    .input-field:focus { border-color:#3B82F6; box-shadow:0 0 0 3px rgba(59,130,246,.15); }
    .label { font-size:.8rem; font-weight:600; color:#374151; margin-bottom:.35rem; display:block; }
    .main { margin-left:240px; }
    @media(max-width:768px){ .sidebar{display:none;} .main{margin-left:0;} }
  </style>
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>

<div class="main">
  <header style="height:4rem;background:#fff;border-bottom:1px solid #E2E8F0;display:flex;align-items:center;padding:0 1.5rem;position:sticky;top:0;z-index:30;">
    <h2 style="font-size:1rem;font-weight:600;color:#0F172A;">Create Fleet Assignment</h2>
    <div style="margin-left:auto;display:flex;align-items:center;gap:.75rem;">
      <button style="position:relative;padding:.5rem;border:0;background:transparent;cursor:pointer;"><i class="fa-solid fa-bell" style="color:#64748B;font-size:1rem;"></i><span style="position:absolute;top:.3rem;right:.3rem;width:.5rem;height:.5rem;background:#EF4444;border-radius:999px;"></span></button>
      <div style="width:2rem;height:2rem;background:#2563EB;border-radius:999px;display:flex;align-items:center;justify-content:center;"><span style="color:#fff;font-size:.7rem;font-weight:700;">AD</span></div>
    </div>
  </header>

  <main style="padding:1.5rem;max-width:900px;">
    <div style="margin-bottom:1.5rem;">
      <h1 style="font-size:1.5rem;font-weight:700;color:#0F172A;">Create Fleet Assignment</h1>
      <p style="color:#64748B;font-size:.875rem;margin-top:.25rem;">Register a new vehicle, assign a driver, and plan a route</p>
    </div>

    <form onsubmit="submitFleet(event)">
      <!-- Vehicle Details -->
      <div class="card" style="padding:1.5rem;margin-bottom:1rem;">
        <h3 style="font-weight:700;color:#0F172A;margin-bottom:1rem;display:flex;align-items:center;gap:.5rem;"><i class="fa-solid fa-truck" style="color:#3B82F6;"></i> Vehicle Details</h3>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
          <div>
            <label class="label">Vehicle Type *</label>
            <select class="input-field" required>
              <option value="">Select type...</option>
              <option>Truck</option><option>Trailer</option><option>Van</option><option>Flatbed</option><option>Tanker</option>
            </select>
          </div>
          <div>
            <label class="label">Vehicle ID / Plate *</label>
            <input type="text" class="input-field" placeholder="e.g. T-101 / MH 12 AD 1234" required />
          </div>
          <div>
            <label class="label">Make & Model</label>
            <input type="text" class="input-field" placeholder="e.g. Volvo FH16" />
          </div>
          <div>
            <label class="label">Year</label>
            <input type="number" class="input-field" placeholder="2022" min="1990" max="2030" />
          </div>
          <div>
            <label class="label">VIN Number</label>
            <input type="text" class="input-field" placeholder="17-character VIN" />
          </div>
          <div>
            <label class="label">Fuel Type</label>
            <select class="input-field">
              <option>Diesel</option><option>Petrol</option><option>CNG</option><option>Electric</option><option>Hybrid</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Driver Assignment -->
      <div class="card" style="padding:1.5rem;margin-bottom:1rem;">
        <h3 style="font-weight:700;color:#0F172A;margin-bottom:1rem;display:flex;align-items:center;gap:.5rem;"><i class="fa-solid fa-user-tie" style="color:#10B981;"></i> Driver Assignment</h3>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
          <div>
            <label class="label">Primary Driver *</label>
            <select class="input-field" required>
              <option value="">Select driver...</option>
              <option>John Doe — DL-4521</option>
              <option>Sarah Lee — DL-7890</option>
              <option>Mike Chen — DL-3312</option>
              <option>Carlos Rivera — DL-9901</option>
              <option>Emma Johnson — DL-1123</option>
            </select>
          </div>
          <div>
            <label class="label">Co-Driver (Optional)</label>
            <select class="input-field">
              <option value="">None</option>
              <option>Priya Patel — DL-5544</option>
              <option>Raj Sharma — DL-8800</option>
              <option>David Kim — DL-4422</option>
            </select>
          </div>
          <div>
            <label class="label">Contact Number</label>
            <input type="tel" class="input-field" placeholder="+1 555 000 0000" />
          </div>
          <div>
            <label class="label">License Expiry</label>
            <input type="date" class="input-field" />
          </div>
        </div>
      </div>

      <!-- Route / Trip Planning -->
      <div class="card" style="padding:1.5rem;margin-bottom:1rem;">
        <h3 style="font-weight:700;color:#0F172A;margin-bottom:1rem;display:flex;align-items:center;gap:.5rem;"><i class="fa-solid fa-route" style="color:#F59E0B;"></i> Route & Trip Details</h3>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
          <div>
            <label class="label">Origin *</label>
            <input type="text" class="input-field" placeholder="Departure location" required />
          </div>
          <div>
            <label class="label">Destination *</label>
            <input type="text" class="input-field" placeholder="Delivery location" required />
          </div>
          <div>
            <label class="label">Departure Date & Time *</label>
            <input type="datetime-local" class="input-field" required />
          </div>
          <div>
            <label class="label">Expected Arrival</label>
            <input type="datetime-local" class="input-field" />
          </div>
          <div>
            <label class="label">Cargo Type</label>
            <select class="input-field">
              <option>General Freight</option><option>Perishable Goods</option><option>Hazardous Materials</option><option>Heavy Machinery</option><option>Liquid Bulk</option><option>Containers</option>
            </select>
          </div>
          <div>
            <label class="label">Cargo Weight (kg)</label>
            <input type="number" class="input-field" placeholder="e.g. 12500" />
          </div>
          <div style="grid-column:1/-1;">
            <label class="label">Special Instructions</label>
            <textarea class="input-field" rows="3" placeholder="Any special handling, route restrictions, or delivery notes..."></textarea>
          </div>
        </div>
      </div>

      <!-- Yard / Parking -->
      <div class="card" style="padding:1.5rem;margin-bottom:1.5rem;">
        <h3 style="font-weight:700;color:#0F172A;margin-bottom:1rem;display:flex;align-items:center;gap:.5rem;"><i class="fa-solid fa-warehouse" style="color:#8B5CF6;"></i> Yard & Parking</h3>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
          <div>
            <label class="label">Assigned Yard</label>
            <select class="input-field">
              <option>Alpha Yard – North Hub</option>
              <option>Bravo Yard – South Depot</option>
              <option>Charlie Yard – East Terminal</option>
              <option>Delta Yard – West Gate</option>
            </select>
          </div>
          <div>
            <label class="label">Parking Bay</label>
            <input type="text" class="input-field" placeholder="e.g. Bay-12A" />
          </div>
        </div>
      </div>

      <div style="display:flex;gap:.75rem;justify-content:flex-end;">
        <button type="button" onclick="saveDraft()" style="padding:.65rem 1.5rem;border:1px solid #E2E8F0;border-radius:.6rem;font-size:.875rem;font-weight:600;background:#fff;color:#374151;cursor:pointer;">
          <i class="fa-solid fa-file-pen" style="margin-right:.4rem;color:#64748B;"></i>Save as Draft
        </button>
        <button type="submit" style="padding:.65rem 1.5rem;background:#3B82F6;color:#fff;border:0;border-radius:.6rem;font-size:.875rem;font-weight:600;cursor:pointer;">
          <i class="fa-solid fa-paper-plane" style="margin-right:.4rem;"></i>Create Fleet Assignment
        </button>
      </div>
    </form>
  </main>
</div>

<div id="toast" style="display:none;position:fixed;bottom:1.5rem;right:1.5rem;background:#10B981;color:#fff;padding:.75rem 1.25rem;border-radius:.75rem;font-size:.875rem;font-weight:600;z-index:999;box-shadow:0 4px 12px rgba(0,0,0,.15);">
  <i class="fa-solid fa-circle-check" style="margin-right:.4rem;"></i><span id="toast-msg"></span>
</div>

<script>
  function toggleDropdown(id) {
    const dd = document.getElementById(id);
    const icon = document.getElementById(id + '-icon');
    dd.classList.toggle('open');
    icon.style.transform = dd.classList.contains('open') ? 'rotate(180deg)' : 'rotate(0)';
  }
  function showToast(msg, color='#10B981') {
    const t = document.getElementById('toast');
    document.getElementById('toast-msg').textContent = msg;
    t.style.background = color;
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 3000);
  }
  function submitFleet(e) {
    e.preventDefault();
    showToast('Fleet assignment created successfully!');
    setTimeout(() => window.location.href = 'pending-trips.html', 1500);
  }
  function saveDraft() {
    showToast('Saved to drafts!', '#64748B');
    setTimeout(() => window.location.href = 'draft-trips.html', 1500);
  }
</script>
<script>
function toggleDD(id){var el=document.getElementById(id);if(!el)return;var open=el.classList.contains('open');document.querySelectorAll('.dropdown-items').forEach(function(d){d.classList.remove('open');});document.querySelectorAll('.dropdown-btn').forEach(function(b){b.classList.remove('open');});if(!open){el.classList.add('open');el.previousElementSibling.classList.add('open');}}
(function(){var p=location.pathname.split('/').pop()||'dashboard.html';document.querySelectorAll('.nav-link').forEach(function(a){if(a.getAttribute('href')===p){a.classList.add('active');}else{a.classList.remove('active');}});document.querySelectorAll('.sub-link').forEach(function(a){if(a.getAttribute('href')===p){a.classList.add('active');var dd=a.closest('.dropdown-items');if(dd){dd.classList.add('open');dd.previousElementSibling.classList.add('open');}}});})();
</script>
<script src="store-sidebar.js"></script><script>renderStoreSidebar("cfleet");</script>
</body>
</html>
