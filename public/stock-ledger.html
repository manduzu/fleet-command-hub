<!doctype html><html lang="en"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Stock Ledger — FleetCtrl</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{brand:{600:'#2563EB'},ink:{900:'#0F172A',500:'#64748B',200:'#E2E8F0'}}}}}</script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link rel="stylesheet" href="store-theme.css"/></head>
<body>
<aside class="sidebar" id="sidebar"></aside>
<main class="main">
<header class="bg-white border-b border-ink-200 px-6 py-3 flex items-center justify-between sticky top-0 z-30">
  <div><div class="text-[11px] text-ink-500">Stores / Inventory / <span class="text-ink-900">Stock Ledger</span></div>
    <h1 class="text-lg font-bold">Stock Ledger</h1></div>
  <div class="flex gap-2">
    <button onclick="exportCSV()" class="btn btn-ghost"><i class="fas fa-file-csv"></i>Export CSV</button>
    <a href="grn-create.html" class="btn btn-primary"><i class="fas fa-plus"></i>Manual Entry</a>
  </div>
</header>
<div class="p-6 space-y-5">
  <section class="grid grid-cols-2 md:grid-cols-5 gap-3">
    <div class="card p-4"><div class="kpi-label">Receipts (MTD)</div><div class="text-2xl font-bold text-emerald-600">+1,840</div><div class="text-[11px] text-ink-500">$284K in</div></div>
    <div class="card p-4"><div class="kpi-label">Issues (MTD)</div><div class="text-2xl font-bold text-red-600">-1,520</div><div class="text-[11px] text-ink-500">$214K out</div></div>
    <div class="card p-4"><div class="kpi-label">Adjustments</div><div class="text-2xl font-bold text-amber-600">±42</div></div>
    <div class="card p-4"><div class="kpi-label">Returns</div><div class="text-2xl font-bold">28</div></div>
    <div class="card p-4"><div class="kpi-label">Net Movement</div><div class="text-2xl font-bold text-emerald-600">+320</div></div>
  </section>
  <section class="card p-5">
    <div class="flex flex-wrap gap-2 mb-4">
      <input placeholder="SKU or reference..." class="max-w-xs"/>
      <select class="max-w-[160px]"><option>All Movements</option><option>Receipt</option><option>Issue</option><option>Return</option><option>Adjustment</option><option>Transfer</option></select>
      <input type="date" class="max-w-[160px]"/>
      <input type="date" class="max-w-[160px]"/>
    </div>
    <table class="tbl" id="lt">
      <thead><tr><th>Date</th><th>Reference</th><th>SKU</th><th>Description</th><th>Type</th><th>In</th><th>Out</th><th>Balance</th><th>Source</th></tr></thead>
      <tbody></tbody>
    </table>
  </section>
</div></main>
<script src="store-sidebar.js"></script><script>renderStoreSidebar('ledger');
const data=[
 ['2026-05-05','GRN-2026-088','TY-2201','Bridgestone M729','Receipt',24,0,56,'Bridgestone EA'],
 ['2026-05-05','ISS-2026-302','TY-2201','Bridgestone M729','Issue',0,4,52,'JC-2026-088'],
 ['2026-05-04','GRN-2026-087','SP-1006','Diesel Filter','Receipt',50,0,45,'Sandvik'],
 ['2026-05-04','ISS-2026-301','SP-1003','Engine Oil 15W-40','Issue',0,40,420,'JC-2026-086'],
 ['2026-05-03','RET-2026-019','SP-1002','Air Filter','Return',2,0,8,'Workshop A'],
 ['2026-05-03','ADJ-2026-007','SP-1009','U-Bolt 22mm','Adjustment',0,2,0,'Cycle Count'],
 ['2026-05-02','GRN-2026-086','SP-1003','Engine Oil 15W-40','Receipt',200,0,460,'Total Lubricants'],
 ['2026-05-02','ISS-2026-300','SP-1004','Wheel Hub Bearing','Issue',0,3,2,'JC-2026-084'],
 ['2026-05-01','TRF-2026-011','SP-1010','Side Mirror','Transfer',0,5,14,'WH-A → WH-B'],
];
const pill={Receipt:'pill-success',Issue:'pill-danger',Return:'pill-primary',Adjustment:'pill-warning',Transfer:'pill-purple'};
document.querySelector('#lt tbody').innerHTML=data.map(r=>`<tr><td>${r[0]}</td><td class="text-brand-600 font-semibold">${r[1]}</td><td>${r[2]}</td><td>${r[3]}</td><td><span class="pill ${pill[r[4]]}">${r[4]}</span></td><td class="text-emerald-600 font-semibold">${r[5]||''}</td><td class="text-red-600 font-semibold">${r[6]||''}</td><td class="font-semibold">${r[7]}</td><td>${r[8]}</td></tr>`).join('');
function exportCSV(){const rows=[['Date','Ref','SKU','Description','Type','In','Out','Balance','Source'],...data].map(r=>r.join(',')).join('\n');const b=new Blob([rows],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='stock-ledger.csv';a.click();}
</script>
</body></html>
